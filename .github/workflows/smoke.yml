name: ONGP GitHub Runtime

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
  workflow_dispatch:
    inputs:
      run_external_smoke:
        description: "Testar conectividade com APIs publicas externas"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  packages: write

concurrency:
  group: ongp-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  OPENAI_MODEL: gpt-4o-mini
  GOOGLE_REDIRECT_URI: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/api/v1/auth/oauth/google/callback
  NEXT_PUBLIC_API_BASE_URL: /api/backend
  INTERNAL_API_BASE_URL: http://api:8000/api/v1

jobs:
  backend-smoke:
    name: Backend compile and settings
    runs-on: ubuntu-latest
    env:
      CGU_API_KEY: ${{ secrets.CGU_API_KEY }}
      PORTAL_TRANSPARENCIA_API_KEY: ${{ secrets.PORTAL_TRANSPARENCIA_API_KEY || secrets.CGU_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      DB_URL: sqlite:///./ongp_ci_smoke.db
      DATABASE_URL: sqlite:///./ongp_ci_smoke.db
      REDIS_URL: redis://localhost:6379/0
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ongp_password
      NEO4J_DATABASE: neo4j
      ELASTICSEARCH_URL: http://localhost:9200
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Install backend dependencies
        working-directory: api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile backend
        working-directory: api
        run: python -m compileall app

      - name: Validate GitHub secret wiring
        if: github.event_name != 'pull_request'
        working-directory: api
        run: |
          python - <<'PY'
          from app.core.config import settings

          required = {
              "CGU_API_KEY": settings.CGU_API_KEY,
              "OPENAI_API_KEY": settings.OPENAI_API_KEY,
              "GOOGLE_CLIENT_ID": settings.GOOGLE_CLIENT_ID,
              "GOOGLE_CLIENT_SECRET": settings.GOOGLE_CLIENT_SECRET,
          }
          missing = [name for name, value in required.items() if not value]
          if missing:
              raise SystemExit(f"Missing GitHub repository secrets: {', '.join(missing)}")
          print("ONGP secret wiring OK")
          PY

      - name: External public API smoke
        if: github.event_name == 'workflow_dispatch' && inputs.run_external_smoke == 'true'
        working-directory: api
        run: |
          python - <<'PY'
          import httpx

          with httpx.Client(timeout=30.0) as client:
              response = client.get(
                  "https://dadosabertos.camara.leg.br/api/v2/deputados",
                  params={"itens": 1, "pagina": 1},
              )
              response.raise_for_status()
              payload = response.json()
              if not payload.get("dados"):
                  raise SystemExit("Camara Dados Abertos returned no records.")

          print("External public API smoke OK")
          PY

  frontend-smoke:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: web
        run: npm install

      - name: Build frontend
        working-directory: web
        run: npm run build

  compose-smoke:
    name: Docker Compose config
    runs-on: ubuntu-latest
    env:
      CGU_API_KEY: ${{ secrets.CGU_API_KEY }}
      PORTAL_TRANSPARENCIA_API_KEY: ${{ secrets.PORTAL_TRANSPARENCIA_API_KEY || secrets.CGU_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      HTTP_VERIFY_SSL: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker compose
        run: docker compose config --quiet

  publish-images:
    name: Build and publish GHCR images
    runs-on: ubuntu-latest
    needs:
      - backend-smoke
      - frontend-smoke
      - compose-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve lowercase image names
        id: image_names
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          repo="${GITHUB_REPOSITORY#*/}"
          repo="${repo,,}"
          echo "api=ghcr.io/${owner}/${repo}-api" >> "$GITHUB_OUTPUT"
          echo "web=ghcr.io/${owner}/${repo}-web" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.image_names.outputs.api }}:latest
            ${{ steps.image_names.outputs.api }}:${{ github.sha }}
          cache-from: type=gha,scope=ongp-api
          cache-to: type=gha,mode=max,scope=ongp-api

      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.image_names.outputs.web }}:latest
            ${{ steps.image_names.outputs.web }}:${{ github.sha }}
          cache-from: type=gha,scope=ongp-web
          cache-to: type=gha,mode=max,scope=ongp-web
