services:
  postgres:
    image: postgres:16-alpine
    container_name: ongp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ongp
      POSTGRES_USER: ongp_user
      POSTGRES_PASSWORD: ongp_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ongp_user -d ongp"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ongp-net

  redis:
    image: redis:7-alpine
    container_name: ongp-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ongp-net

  neo4j:
    image: neo4j:5
    container_name: ongp-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/ongp_password
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u neo4j -p ongp_password 'RETURN 1' || exit 1"
        ]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - ongp-net

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: ongp-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:9200/_cluster/health || exit 1"
        ]
      interval: 15s
      timeout: 10s
      retries: 15
    networks:
      - ongp-net

  api:
    build:
      context: ./api
    container_name: ongp-api
    restart: unless-stopped
    environment:
      DB_URL: postgresql+psycopg://ongp_user:ongp_password@postgres:5432/ongp
      DATABASE_URL: postgresql+psycopg://ongp_user:ongp_password@postgres:5432/ongp
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ongp_password
      NEO4J_DATABASE: neo4j
      ELASTICSEARCH_URL: http://elasticsearch:9200
      HTTP_VERIFY_SSL: ${HTTP_VERIFY_SSL:-true}
      PORTAL_TRANSPARENCIA_API_KEY: ${PORTAL_TRANSPARENCIA_API_KEY:-}
      JWT_SECRET_KEY: ongp-change-me-in-production
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 60
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      GOVBR_CLIENT_ID: ${GOVBR_CLIENT_ID:-}
      GOVBR_REDIRECT_URI: ${GOVBR_REDIRECT_URI:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - ongp-net

  celery_worker:
    build:
      context: ./api
    container_name: ongp-celery-worker
    restart: unless-stopped
    command: celery -A app.core.celery_app worker --loglevel=INFO
    environment:
      DB_URL: postgresql+psycopg://ongp_user:ongp_password@postgres:5432/ongp
      DATABASE_URL: postgresql+psycopg://ongp_user:ongp_password@postgres:5432/ongp
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ongp_password
      NEO4J_DATABASE: neo4j
      ELASTICSEARCH_URL: http://elasticsearch:9200
      HTTP_VERIFY_SSL: ${HTTP_VERIFY_SSL:-true}
      PORTAL_TRANSPARENCIA_API_KEY: ${PORTAL_TRANSPARENCIA_API_KEY:-}
      JWT_SECRET_KEY: ongp-change-me-in-production
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 60
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      GOVBR_CLIENT_ID: ${GOVBR_CLIENT_ID:-}
      GOVBR_REDIRECT_URI: ${GOVBR_REDIRECT_URI:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - ongp-net

  web:
    build:
      context: ./web
    container_name: ongp-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
      INTERNAL_API_BASE_URL: http://api:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - ongp-net

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: ongp-prometheus
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - api
    networks:
      - ongp-net

  grafana:
    image: grafana/grafana:11.4.0
    container_name: ongp-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ongp_admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - ongp-net

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  elasticsearch_data:
  prometheus_data:
  grafana_data:

networks:
  ongp-net:
    driver: bridge
